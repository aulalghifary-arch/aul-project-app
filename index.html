<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Buku Kas Aul</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 40px 20px; line-height: 1.6; background-color: #f4f7f6; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { display: block; width: 100%; padding: 15px; margin: 15px 0; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 16px; box-sizing: border-box; }
        .btn-web { background-color: #28a745; color: white; }
        .btn-apk { background-color: #007bff; color: white; }
        .guide { text-align: left; margin-top: 30px; padding: 20px; background: #fff3cd; border-left: 5px solid #ffc107; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Buku Kas Aul</h1>
        <p>Kelola keuangan Anda dengan mudah dan praktis.</p>
        
        <a href="https://proyek-kas.vercel.app" class="btn btn-web">Buka Aplikasi via Web</a>
        <a href="https://github.com/aulalghifary-arch/AndroidWebView-Scaffold/releases/latest/download/BukuKas.apk" class="btn btn-apk">Download Aplikasi (APK)</a>
        
        <div class="guide">
            <h3>Cara Instal APK</h3>
            <p>Jika muncul peringatan <b>"Sumber Tak Dikenal"</b>:</p>
            <ol>
                <li>Klik <b>Setelan/Settings</b>.</li>
                <li>Aktifkan <b>"Izinkan dari sumber ini"</b>.</li>
                <li>Kembali dan klik <b>Instal</b>.</li>
            </ol>
        </div>
    </div>
